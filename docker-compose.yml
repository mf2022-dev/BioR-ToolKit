# =============================================================================
# BioR Platform - Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # Start in background
#   docker compose logs -f        # View logs
#   docker compose down           # Stop
#   docker compose up --build     # Rebuild and start
# =============================================================================

services:
  bior-platform:
    build: .
    container_name: bior-platform
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/dashboard"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # Optional: Reverse proxy with HTTPS (uncomment to use)
